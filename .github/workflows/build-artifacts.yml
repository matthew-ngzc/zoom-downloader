name: Build Artifacts

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runs_on: windows-latest
          - target: macos-arm64
            runs_on: macos-14
          - target: macos-x64
            runs_on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

  build:
    needs: test
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runs_on: windows-latest
            artifact_name: zoom-downloader-windows-x64
            zip_name: zoom-downloader-windows-x64.zip
          - target: macos-arm64
            runs_on: macos-14
            artifact_name: zoom-downloader-macos-arm64
            zip_name: zoom-downloader-macos-arm64.zip
          - target: macos-x64
            runs_on: macos-13
            artifact_name: zoom-downloader-macos-x64
            zip_name: zoom-downloader-macos-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --dev

      - name: Build with PyInstaller spec
        run: uv run pyinstaller --noconfirm --clean zoom-downloader.spec

      - name: Package Windows release zip
        if: matrix.target == 'windows-x64'
        shell: pwsh
        run: |
          $pkg = "release_package"
          Remove-Item -Recurse -Force $pkg -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "dist/zoom-downloader.exe" "$pkg/zoom-downloader.exe"
          Copy-Item "Run Zoom Downloader.bat" "$pkg/Run Zoom Downloader.bat"
          Copy-Item "README.md" "$pkg/README.md"
          Copy-Item "LICENSE" "$pkg/LICENSE"
          Compress-Archive -Path "$pkg/*" -DestinationPath "${{ matrix.zip_name }}" -Force

      - name: Package macOS release zip
        if: matrix.target == 'macos-arm64' || matrix.target == 'macos-x64'
        shell: bash
        run: |
          set -euo pipefail
          pkg="release_package"
          rm -rf "$pkg"
          mkdir -p "$pkg"
          cp dist/zoom-downloader "$pkg/zoom-downloader"
          cp "Run Zoom Downloader.command" "$pkg/Run Zoom Downloader.command"
          chmod +x "$pkg/zoom-downloader"
          chmod +x "$pkg/Run Zoom Downloader.command"
          cp README.md "$pkg/README.md"
          cp LICENSE "$pkg/LICENSE"
          (cd "$pkg" && zip -r "../${{ matrix.zip_name }}" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.zip_name }}
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release_artifacts/**/*
